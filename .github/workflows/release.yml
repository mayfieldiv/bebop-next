name: Release

on:
  push:
    tags:
      - "*.*.*"

permissions:
  contents: write

jobs:
  validate:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.check.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Validate tag matches VERSION
        id: check
        run: |
          version=$(cat VERSION)
          if [ "$version" != "$GITHUB_REF_NAME" ]; then
            echo "::error::VERSION file ($version) does not match tag ($GITHUB_REF_NAME)"
            exit 1
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"

  linux-x64:
    needs: [validate]
    uses: ./.github/workflows/build.yml
    with:
      os: ubuntu-latest
      arch: x64
      swift-version: "6.2"


  linux-arm64:
    needs: [validate]
    uses: ./.github/workflows/build.yml
    with:
      os: ubuntu-24.04-arm
      arch: arm64
      swift-version: "6.2"


  macos-arm64:
    needs: [validate]
    uses: ./.github/workflows/build.yml
    with:
      os: macos-26
      arch: arm64
      swift-version: "6.2"

  macos-x64:
    needs: [validate]
    uses: ./.github/workflows/build.yml
    with:
      os: macos-26
      arch: x64
      swift-version: "6.2"


  windows-x64:
    needs: [validate]
    uses: ./.github/workflows/build.yml
    with:
      os: windows-latest
      arch: x64
      swift-version: "6.2"

  windows-arm64:
    needs: [validate]
    uses: ./.github/workflows/build.yml
    with:
      os: windows-11-arm
      arch: arm64
      swift-version: "6.2"

  swift:
    needs: [validate]
    uses: ./.github/workflows/swift.yml

  codegen-c:
    needs: [linux-x64]
    uses: ./.github/workflows/codegen.yml
    with:
      artifact: bebopc-ubuntu-latest-x64
      generator: c

  vscode:
    needs: [validate]
    runs-on: ubuntu-latest
    env:
      V: ${{ needs.validate.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build and package extension
        working-directory: plugins/vscode
        run: |
          npm ci
          # Stamp the release version into package.json
          # VS Code requires strict semver — strip pre-release suffix for the extension version
          ext_version="${V%%-*}"
          node -e "
            const pkg = require('./package.json');
            pkg.version = '${ext_version}';
            require('fs').writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "
          npx vsce package -o "bebop-vscode@${V}.vsix"

      - uses: actions/upload-artifact@v4
        with:
          name: bebop-vscode
          path: plugins/vscode/bebop-vscode@${{ env.V }}.vsix
          if-no-files-found: error
          retention-days: 1

  package:
    needs: [validate, linux-x64, linux-arm64, macos-arm64, macos-x64, windows-x64, windows-arm64, swift, codegen-c]
    runs-on: ubuntu-latest
    env:
      V: ${{ needs.validate.outputs.version }}
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Package archives
        run: |
          declare -A ARTIFACT_MAP=(
            ["bebopc-ubuntu-latest-x64"]="linux-x64"
            ["bebopc-ubuntu-24.04-arm-arm64"]="linux-arm64"
            ["bebopc-macos-26-arm64"]="darwin-arm64"
            ["bebopc-macos-26-x64"]="darwin-x64"
            ["bebopc-windows-latest-x64"]="windows-x64"
            ["bebopc-windows-11-arm-arm64"]="windows-arm64"
          )
          mkdir -p dist
          for artifact in "${!ARTIFACT_MAP[@]}"; do
            target="${ARTIFACT_MAP[$artifact]}"
            archive="bebop@${V}+${target}.tar.gz"
            staging=$(mktemp -d)
            src="artifacts/${artifact}"

            mkdir -p "${staging}/bin" "${staging}/lib" "${staging}/include" "${staging}/share/bebop"

            if [[ "$target" == windows-* ]]; then
              cp "${src}/bin/bebopc.exe" "${staging}/bin/"
              cp "${src}/lib/bebop.lib" "${staging}/lib/"
              for gen in ${src}/bin/bebopc-gen-*.exe; do
                [ -f "$gen" ] && cp "$gen" "${staging}/bin/"
              done
            else
              cp "${src}/bin/bebopc" "${staging}/bin/"
              cp "${src}/lib/libbebop.a" "${staging}/lib/"
              for gen in ${src}/bin/bebopc-gen-*; do
                [ -f "$gen" ] && cp "$gen" "${staging}/bin/"
              done
            fi
            cp -r "${src}/include/." "${staging}/include/"
            cp -r "${src}/share/bebop/." "${staging}/share/bebop/"

            tar -czf "dist/${archive}" -C "${staging}" .
            rm -rf "${staging}"
          done

      - name: Generate manifest
        run: |
          jq -n --arg version "$V" --arg tag "$V" \
            '{version: $version, tag: $tag, archives: []}' > dist/bebop@${V}+manifest.json
          for f in dist/bebop@${V}+*.tar.gz; do
            sha=$(sha256sum "$f" | cut -d' ' -f1)
            size=$(stat --format=%s "$f")
            jq --arg file "$(basename "$f")" --arg sha256 "$sha" --argjson size "$size" \
              '.archives += [{file: $file, sha256: $sha256, size: $size}]' \
              dist/bebop@${V}+manifest.json > dist/tmp.json && mv dist/tmp.json dist/bebop@${V}+manifest.json
          done

      - name: Upload release assets
        uses: actions/upload-artifact@v4
        with:
          name: release-assets
          path: dist/
          if-no-files-found: error
          retention-days: 1

  release:
    needs: [validate, package, vscode]
    runs-on: ubuntu-latest
    env:
      V: ${{ needs.validate.outputs.version }}
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: release-assets
          path: dist

      - uses: actions/download-artifact@v4
        with:
          name: bebop-vscode
          path: dist

      - name: Create GitHub release
        run: |
          flags=(--generate-notes)
          if [[ "$V" == *-* ]]; then
            flags+=(--prerelease)
          fi
          gh release create "$V" "${flags[@]}" dist/*
