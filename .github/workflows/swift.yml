name: Reusable Swift Build

on:
  workflow_call:
    inputs:
      os:
        required: false
        type: string
        default: macos-latest
      swift-version:
        required: false
        type: string
        default: "6.2"

jobs:
  build:
    runs-on: ${{ inputs.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: |
          XCODE=$(ls -d /Applications/Xcode_*.app 2>/dev/null | sort -V | tail -1)
          if [ -n "$XCODE" ]; then
            sudo xcode-select -s "$XCODE"
          fi
          swift --version

      - name: Build
        run: swift build --package-path . --product bebopc-gen-swift

      - name: Test
        run: swift test --package-path .
