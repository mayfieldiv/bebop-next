name: Reusable Swift Build

on:
  workflow_call:
    inputs:
      os:
        required: false
        type: string
        default: macos-26

jobs:
  build:
    runs-on: ${{ inputs.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Build
        run: swift build --package-path . --product bebopc-gen-swift

      - name: Test
        run: swift test --package-path .
