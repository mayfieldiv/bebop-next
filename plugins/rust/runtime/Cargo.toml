[package]
name = "bebop-runtime"
version = "0.1.0"
edition = "2021"
description = "Runtime library for Bebop-generated Rust code"
publish = false

[features]
default = ["std"]
std = ["alloc", "half/std"]
alloc = ["half/alloc", "dep:hashbrown"]

[dependencies]
half = { version = "2.7", default-features = false }
hashbrown = { version = "0.15", optional = true }
